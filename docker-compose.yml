services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: soccer_predictor
      MYSQL_USER: soccer
      MYSQL_PASSWORD: soccer
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
